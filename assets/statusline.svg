<svg xmlns="http://www.w3.org/2000/svg" width="980" height="182" viewBox="0 0 980 182" font-family="ui-monospace, SFMono-Regular, 'DejaVu Sans Mono', Menlo, Consolas, monospace" font-size="15">
  <defs>
